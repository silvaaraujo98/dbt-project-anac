name: anac_project

profile: anac_project

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_source'
  anac_project:
    +schema: source

models:
  anac_project:
    # Materialize staging models as views, and marts as tables
    staging:
      +schema: _staging
      +materialized: view
    marts:
      +materialized: table
